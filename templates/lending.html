<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinFlow - Lend & Borrow</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">💰 FinFlow</div>
        <div class="nav-links">
            <a href="/">Dashboard</a>
            <a href="/transactions-page">Transactions</a>
            <a href="/budget-page">Budget Goals</a>
            <a href="/lending-page" class="active">Lend & Borrow</a>
        </div>
    </nav>

    <main class="container">
        <h1>Lend & Borrow</h1>

        <div class="section">
            <h2>Log Money Lent</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label>Person's Name</label>
                    <input type="text" id="person-name" placeholder="e.g. Priya" />
                </div>
                <div class="form-group">
                    <label>Amount (₹)</label>
                    <input type="number" id="lend-amount" placeholder="e.g. 500" />
                </div>
                <div class="form-group">
                    <label>Reason</label>
                    <input type="text" id="lend-reason" placeholder="e.g. Lunch split" />
                </div>
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" id="lend-date" />
                </div>
            </div>
            <button class="btn" onclick="addLending()">Log Lending</button>
        </div>

        <div class="section">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
                <h2 style="margin-bottom:0;">People Who Owe You</h2>
                <div id="total-pending" style="font-size:18px; font-weight:600; color:#f39c12;"></div>
            </div>
            <div id="lending-list">Loading...</div>
        </div>
    </main>

    <script src="/static/lending.js"></script>
</body>
</html>
