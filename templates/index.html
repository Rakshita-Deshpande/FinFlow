<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinFlow</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">💰 FinFlow</div>
        <div class="nav-links">
            <a href="/" class="active">Dashboard</a>
            <a href="/transactions-page">Transactions</a>
            <a href="/budget-page">Budget Goals</a>
            <a href="/lending-page">Lend & Borrow</a>
        </div>
    </nav>

    <main class="container">
        <h1>Welcome to FinFlow</h1>

        <div class="stats-grid">
            <div class="stat-card">
                <p class="stat-label">Total Balance</p>
                <p class="stat-value" id="total-balance">Loading...</p>
            </div>
            <div class="stat-card">
                <p class="stat-label">Monthly Income</p>
                <p class="stat-value income" id="total-income">Loading...</p>
            </div>
            <div class="stat-card">
                <p class="stat-label">Monthly Expenses</p>
                <p class="stat-value expense" id="total-expense">Loading...</p>
            </div>
            <div class="stat-card">
                <p class="stat-label">Total Lent</p>
                <p class="stat-value lent" id="total-lent">Loading...</p>
            </div>
        </div>

        <div class="section">
            <h2>Recent Transactions</h2>
            <div id="recent-transactions">Loading...</div>
        </div>
    </main>

    <script src="/static/app.js"></script>
</body>
</html>
