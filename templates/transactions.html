<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinFlow - Transactions</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">💰 FinFlow</div>
        <div class="nav-links">
            <a href="/">Dashboard</a>
            <a href="/transactions-page" class="active">Transactions</a>
            <a href="/budget-page">Budget Goals</a>
            <a href="/lending-page">Lend & Borrow</a>
        </div>
    </nav>

    <main class="container">
        <h1>Transactions</h1>

        <div class="section">
            <h2>Add New Transaction</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="title" placeholder="e.g. Swiggy order" />
                </div>
                <div class="form-group">
                    <label>Amount (₹)</label>
                    <input type="number" id="amount" placeholder="0.00" />
                </div>
                <div class="form-group">
                    <label>Type</label>
                    <select id="type">
                        <option value="expense">Expense</option>
                        <option value="income">Income</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="category">
                        <option value="Food">Food & Dining</option>
                        <option value="Transport">Transport</option>
                        <option value="Shopping">Shopping</option>
                        <option value="Bills">Bills & Utilities</option>
                        <option value="Entertainment">Entertainment</option>
                        <option value="Salary">Salary</option>
                        <option value="Freelance">Freelance</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" id="date" />
                </div>
                <div class="form-group">
                    <label>Notes (optional)</label>
                    <input type="text" id="notes" placeholder="Any extra details..." />
                </div>
            </div>
            <button class="btn" onclick="addTransaction()">Add Transaction</button>
        </div>

        <div class="section">
            <h2>All Transactions</h2>
            <div id="transactions-list">Loading...</div>
        </div>
    </main>

    
    <script src="/static/transactions.js"></script>
</body>
</html>
